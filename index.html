<!DOCTYPE html>

<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Naša svadba</title>

  <!-- Google fonty -->

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Raleway&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #f2ede6; /* dark ivory */
      font-family: 'Raleway', sans-serif;
      text-align: center;
      color: #3a3a3a; /* tmavošedá */
      padding: 60px 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 58px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    h2 {
      margin-top: 40px;
      font-size: 22px;
      color: #5a5a5a;
      letter-spacing: 1px;
    }

    p {
      font-size: 20px;
      margin: 5px 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background-color: #bbb;
      margin: 20px auto;
    }
  </style>

</head>

<body>

  <h1>Diana & Anton</h1>
  <div class="divider"></div>

  <p>Vitajte na našej svadobnej stránke</p>

  <h2>Dátum</h2>
  <p>19. september 2026</p>

  <h2>Miesto</h2>
  <p>Piešťany</p>

</body>
</html>
