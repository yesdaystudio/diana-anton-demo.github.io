<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naša svadba | Diana & Anton</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f6f1eb;
  --text:#3e3a36;
  --muted:#8b8178;
  --line:#d8cfc5;
}

body {
  margin:0;
  background:var(--bg);
  font-family:'Raleway', sans-serif;
  color:var(--text);
  text-align:center;
  padding:40px 20px 70px;
}

.container {
  max-width:720px;
  margin:auto;
}

.line {
  width:70px;
  height:1px;
  background:var(--line);
  margin:20px auto;
}

h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:52px;
  font-weight:400;
  margin:0;
}

.date {
  font-size:12px;
  letter-spacing:3px;
  color:var(--muted);
  margin-top:20px;
}

.hero img {
  width:100%;
  border-radius:14px;
  margin:40px 0 20px;
}

.btn {
  display:inline-block;
  border:1px solid var(--text);
  padding:12px 28px;
  font-size:11px;
  letter-spacing:3px;
  text-decoration:none;
  color:var(--text);
  margin-top:15px;
}

.story {
  margin:40px auto;
  max-width:500px;
  line-height:1.8;
}

.buttons {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.button {
  cursor:pointer;
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  background:none;
  border:none;
  color:var(--muted);
}

.button.active {
  color:var(--text);
}

.content {
  display:none;
  margin-top:25px;
  padding:20px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,0.6);
}

.place-card {
  margin:15px 0;
}

.place-title {
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
}

.place-name {
  font-family:'Cormorant Garamond', serif;
  font-size:24px;
}

.place-link {
  font-size:11px;
  letter-spacing:2px;
  text-decoration:none;
  border-bottom:1px solid #999;
  color:var(--text);
}

.timeline strong {
  font-family:'Cormorant Garamond', serif;
}

.color-palette {
  display:flex;
  justify-content:center;
  gap:12px;
  margin:15px 0;
}

.color-dot {
  width:22px;
  height:22px;
  border-radius:50%;
}

.calendar-buttons {
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:18px 0 8px;
}

.calendar-btn {
  display:inline-block;
  border:1px solid var(--line);
  padding:11px 18px;
  font-size:10px;
  letter-spacing:2px;
  text-decoration:none;
  color:var(--text);
  text-transform:uppercase;
  background:rgba(255,255,255,0.45);
}

.calendar-btn:hover {
  border-color:var(--text);
}
</style>

<script>
function toggle(id){
  const sections=["mapa","harmonogram","menu","dresscode"];
  const buttons=document.querySelectorAll(".button");

  sections.forEach(sec=>{
    let el=document.getElementById(sec);
    if(sec===id){
      el.style.display = el.style.display==="block" ? "none":"block";
    } else {
      el.style.display="none";
    }
  });

  buttons.forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.target===id);
  });
}
</script>

</head>

<body>

<div class="container">

<div class="line"></div>
<h1>Diana<br>&<br>Anton</h1>
<div class="line"></div>

<div class="date">19. september 2026</div>

<p style="font-family:'Cormorant Garamond', serif; font-size:24px; color:#8b8178; margin-top:24px;">
  Vitajte na našom svadobnom webe ♡
</p>

<div class="hero">
<img src="rings.jpg">
</div>

<a class="btn" href="https://yesdaystudio.github.io/Klientska-zona-premium/">Potvrdiť účasť</a>

<div class="calendar-buttons">
  <a class="calendar-btn" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Svadba%20Diana%20%26%20Anton&dates=20260919/20260920&details=Svadobn%C3%BD%20de%C5%88%20Diany%20a%20Antona%20v%20Pie%C5%A1%C5%A5anoch.&location=Pie%C5%A1%C5%A5any%2C%20Slovensko" target="_blank">Google Calendar</a>
</div>

<div class="story">
Kde sa všetko začalo, tam aj pokračuje...
</div>

</div>

</body>
</html>
